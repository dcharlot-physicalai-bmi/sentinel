<rect x="740" y="450" width="120" height="120" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="2"/><text x="800" y="516" font-size="18" fill="#5F5E5A" text-anchor="middle">obstacle</text>
