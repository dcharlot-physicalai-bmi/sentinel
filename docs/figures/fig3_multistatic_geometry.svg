<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg"><rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>
<text x="80" y="84" font-family="Arial,sans-serif" font-size="44" font-weight="500" fill="#2C2C2A">Multistatic aspect diversity</text>
<text x="80" y="126" font-family="Arial,sans-serif" font-size="24" fill="#5F5E5A">separated nodes &#8594; shadow from one is lit by another</text>
<rect x="300" y="170" width="680" height="470" rx="16" fill="#FAFAF8" stroke="#B4B2A9" stroke-width="2"/>
