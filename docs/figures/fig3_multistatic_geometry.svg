<circle cx="360" cy="240" r="22" fill="#E6F1FB" stroke="#378ADD" stroke-width="2.5"/><circle cx="920" cy="240" r="22" fill="#E6F1FB" stroke="#378ADD" stroke-width="2.5"/><circle cx="360" cy="570" r="22" fill="#E6F1FB" stroke="#378ADD" stroke-width="2.5"/><circle cx="920" cy="570" r="22" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="2.5"/>
<text x="360" y="214" font-size="20" fill="#185FA5" text-anchor="middle">node A</text><text x="920" y="214" font-size="20" fill="#185FA5" text-anchor="middle">node B</text><text x="360" y="612" font-size="20" fill="#185FA5" text-anchor="middle">node C</text><text x="920" y="612" font-size="20" fill="#5F5E5A" text-anchor="middle">node D (shadowed)</text>
