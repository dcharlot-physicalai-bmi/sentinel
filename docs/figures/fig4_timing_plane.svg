<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg"><rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>
<text x="80" y="84" font-family="Arial,sans-serif" font-size="44" font-weight="500" fill="#2C2C2A">One clock, three rates</text>
<text x="80" y="126" font-family="Arial,sans-serif" font-size="24" fill="#5F5E5A">epoch clock = coherence + schedule + key rotation</text>
<g font-family="Arial,sans-serif">
<rect x="80" y="200" width="220" height="360" rx="18" fill="#EEEDFE" stroke="#7F77DD" stroke-width="2"/><text x="190" y="368" font-size="28" font-weight="500" fill="#3C3489" text-anchor="middle">epoch</text><text x="190" y="404" font-size="28" font-weight="500" fill="#3C3489" text-anchor="middle">clock</text>
<line x1="300" y1="250" x2="470" y2="250" stroke="#888780" stroke-width="2"/><line x1="300" y1="350" x2="470" y2="350" stroke="#888780" stroke-width="2"/><line x1="300" y1="450" x2="470" y2="450" stroke="#888780" stroke-width="2"/><line x1="300" y1="540" x2="470" y2="540" stroke="#888780" stroke-width="2"/>
<text x="490" y="240" font-size="24" font-weight="500" fill="#0F6E56">pulse train &#8212; 4 kHz</text><g stroke="#1D9E75" stroke-width="2.5"><line x1="490" y1="262" x2="490" y2="290"/><line x1="510" y1="262" x2="510" y2="290"/><line x1="530" y1="262" x2="530" y2="290"/><line x1="550" y1="262" x2="550" y2="290"/><line x1="570" y1="262" x2="570" y2="290"/><line x1="590" y1="262" x2="590" y2="290"/><line x1="610" y1="262" x2="610" y2="290"/><line x1="630" y1="262" x2="630" y2="290"/><line x1="650" y1="262" x2="650" y2="290"/><line x1="670" y1="262" x2="670" y2="290"/><line x1="690" y1="262" x2="690" y2="290"/><line x1="710" y1="262" x2="710" y2="290"/><line x1="730" y1="262" x2="730" y2="290"/><line x1="750" y1="262" x2="750" y2="290"/><line x1="770" y1="262" x2="770" y2="290"/><line x1="790" y1="262" x2="790" y2="290"/><line x1="810" y1="262" x2="810" y2="290"/><line x1="830" y1="262" x2="830" y2="290"/><line x1="850" y1="262" x2="850" y2="290"/><line x1="870" y1="262" x2="870" y2="290"/><line x1="890" y1="262" x2="890" y2="290"/><line x1="910" y1="262" x2="910" y2="290"/><line x1="930" y1="262" x2="930" y2="290"/><line x1="950" y1="262" x2="950" y2="290"/></g><text x="1010" y="282" font-size="20" fill="#5F5E5A">coherence</text>
<text x="490" y="340" font-size="24" font-weight="500" fill="#0F6E56">fast chain &#8212; 60 Hz</text><g stroke="#1D9E75" stroke-width="2.5"><line x1="490" y1="362" x2="490" y2="390"/><line x1="560" y1="362" x2="560" y2="390"/><line x1="630" y1="362" x2="630" y2="390"/><line x1="700" y1="362" x2="700" y2="390"/><line x1="770" y1="362" x2="770" y2="390"/><line x1="840" y1="362" x2="840" y2="390"/><line x1="910" y1="362" x2="910" y2="390"/></g><text x="1010" y="382" font-size="20" fill="#5F5E5A">fall / velocity</text>
<text x="490" y="440" font-size="24" font-weight="500" fill="#854F0B">vitals chain &#8212; ~1 Hz</text><g stroke="#EF9F27" stroke-width="2.5"><line x1="490" y1="462" x2="490" y2="490"/><line x1="720" y1="462" x2="720" y2="490"/><line x1="950" y1="462" x2="950" y2="490"/></g><text x="1010" y="482" font-size="20" fill="#5F5E5A">breathing</text>
<text x="490" y="530" font-size="24" font-weight="500" fill="#888780">camera &#8212; 30 fps</text><g stroke="#B4B2A9" stroke-width="2.5"><line x1="490" y1="552" x2="490" y2="580"/><line x1="600" y1="552" x2="600" y2="580"/><line x1="710" y1="552" x2="710" y2="580"/><line x1="820" y1="552" x2="820" y2="580"/><line x1="930" y1="552" x2="930" y2="580"/></g><text x="1010" y="572" font-size="20" fill="#5F5E5A">aligns by timestamp</text>
<text x="640" y="640" font-size="22" fill="#5F5E5A" text-anchor="middle">camera never sets the rate &#8212; the array runs free underneath</text>
</g></svg>